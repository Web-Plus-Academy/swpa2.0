<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="../public/favicon.ico" type="image/x-icon" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWCET Registration | Saredufy</title>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Montserrat:wght@400;600&display=swap"
        rel="stylesheet">

    <style>
        /* ================= GLOBAL ================= */
        body {
            font-family: 'Montserrat', sans-serif;
            background: linear-gradient(135deg, #000000, #111111);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
        }

        /* ================= CARD ================= */
        .container {
            background: #0f0f0f;
            padding: 45px;
            border-radius: 18px;
            width: 430px;
            box-shadow: 0 15px 40px rgba(255, 107, 0, 0.15);
            border: 1px solid #222;
        }

        h2 {
            text-align: center;
            margin-bottom: 30px;
            font-family: 'Cinzel', serif;
            font-weight: 700;
            letter-spacing: 2px;
            color: #ff6b00;
        }

        /* ================= FORM GROUP ================= */
        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1px;
            color: #ff6b00;
        }

        input {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #333;
            background: #111;
            color: white;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: #ff6b00;
            box-shadow: 0 0 10px rgba(255, 107, 0, 0.4);
        }

        /* ================= OVERLAY ================= */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: none;
            z-index: 998;
            transition: opacity 0.3s ease;
        }

        /* ================= LOADER CENTERED ================= */
        .loader {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 20, 20, 0.9);
            padding: 40px;
            border-radius: 16px;
            border: 1px solid #333;
            text-align: center;
            z-index: 999;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        /* ================= TOAST GLASS ================= */
        .toast {
            position: fixed;
            top: 30px;
            right: 30px;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(6px);
            border-radius: 14px;
            padding: 18px 24px;
            border-left: 6px solid #ff6b00;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            transform: translateX(150%);
            transition: transform 0.4s ease;
            z-index: 1000;
        }

        /* ================= BUTTON ================= */
        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(90deg, #ff6b00, #ff8c00);
            color: white;
            font-weight: 700;
            cursor: pointer;
            font-size: 15px;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 0, 0.4);
        }

        /* ================= LOADER ================= */
        .loader {
            display: none;
            margin-top: 20px;
            text-align: center;
        }

        .spinner {
            width: 45px;
            height: 45px;
            border: 4px solid #222;
            border-top: 4px solid #ff6b00;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: auto;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        #loaderText {
            margin-top: 10px;
            font-size: 14px;
            color: #aaa;
        }

        /* ================= TOAST ================= */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #111;
            color: white;
            padding: 18px 24px;
            border-radius: 12px;
            border-left: 6px solid #ff6b00;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            transform: translateX(150%);
            transition: transform 0.4s ease;
            z-index: 999;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success {
            border-left-color: #00c853;
        }

        .toast.error {
            border-left-color: #ff1744;
        }

        .toast h4 {
            margin: 0 0 6px 0;
            font-size: 14px;
            font-weight: 700;
        }

        .toast p {
            margin: 0;
            font-size: 13px;
            color: #ccc;
        }
    </style>
</head>

<body>

    <div class="container">

        <h2>SW-CET REGISTRATION</h2>

        <div id="registrationStatus" style="text-align:center; margin-bottom:20px; font-weight:600;"></div>

        <div id="countdownBox" style="text-align:center; margin-bottom:25px;">
            <div id="countdownTimer" style="font-size:18px; font-weight:700; color:#ff6b00;"></div>
        </div>

        <form id="examForm">

            <div class="form-group">
                <label for="name">FULL NAME (name - surname)</label>
                <input type="text" id="name" required>
            </div>

            <div class="form-group">
                <label for="dob">DATE OF BIRTH (exam password enter carefully)</label>
                <input type="date" id="dob" required>
            </div>

            <div class="form-group">
                <label for="phone">PHONE NUMBER (get updates enter carefully)</label>
                <input type="text" id="phone" required>
            </div>

            <div class="form-group">
                <label for="email">EMAIL ADDRESS (receive mail enter carefully)</label>
                <input type="email" id="email" required>
            </div>

            <button type="submit">REGISTER FOR EXAM</button>

        </form>

        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p id="loaderText">Saving in database...</p>
        </div>

        <div class="success-box" id="successBox" style="display:none; margin-top:20px;">
            <h3 style="color:#00c853;">Registration Successful 🎉</h3>
            <p id="applicationNumber"></p>
            <p id="examLink"></p>
        </div>

    </div>

    <div class="toast" id="toast">
        <h4 id="toastTitle"></h4>
        <p id="toastMessage"></p>
    </div>
    <div class="overlay" id="overlay"></div>

</body>

<script>
const form = document.getElementById("examForm");
const loader = document.getElementById("loader");
const loaderText = document.getElementById("loaderText");
const successBox = document.getElementById("successBox");
const overlay = document.getElementById("overlay");

const nameInput = document.getElementById("name");
const dobInput = document.getElementById("dob");
const phoneInput = document.getElementById("phone");
const emailInput = document.getElementById("email");

const registrationStatus = document.getElementById("registrationStatus");
const countdownTimer = document.getElementById("countdownTimer");

/* ================= REGISTRATION WINDOW ================= */

// SET YOUR OPEN & CLOSE TIMES HERE
const registrationStart = new Date("2026-02-15T00:00:00");  // Opens
const registrationEnd   = new Date("2026-02-24T23:59:59");  // Closes

function updateRegistrationStatus() {
    const now = new Date();

    if (now < registrationStart) {
        form.style.display = "none";
        registrationStatus.innerHTML = "🚫 Registration Not Open Yet";
        countdownTo(registrationStart, "Registration Opens In:");

    } else if (now >= registrationStart && now <= registrationEnd) {
        form.style.display = "block";
        registrationStatus.innerHTML = "🟢 Registration Open";
        countdownTo(registrationEnd, "Registration Closes In:");

    } else {
        form.style.display = "none";
        registrationStatus.innerHTML = "⛔ Registration Closed";
        countdownTimer.innerHTML = "Please wait for the next registration cycle.";
    }
}

function countdownTo(targetDate, label) {
    const interval = setInterval(() => {
        const now = new Date();
        const diff = targetDate - now;

        if (diff <= 0) {
            clearInterval(interval);
            updateRegistrationStatus();
            return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / 1000 / 60) % 60);
        const seconds = Math.floor((diff / 1000) % 60);

        countdownTimer.innerHTML =
            `${label} <br>
            ${days}d ${hours}h ${minutes}m ${seconds}s`;

    }, 1000);
}

updateRegistrationStatus();

/* ================= TOAST FUNCTION ================= */
function showToast(type, title, message) {
    const toast = document.getElementById("toast");
    document.getElementById("toastTitle").innerText = title;
    document.getElementById("toastMessage").innerText = message;

    toast.className = "toast show " + type;
    overlay.style.display = "block";

    setTimeout(() => {
        toast.classList.remove("show");
        overlay.style.display = "none";
    }, 4000);
}

/* ================= FORM SUBMIT ================= */
form.addEventListener("submit", async (e) => {
    e.preventDefault();

    loader.style.display = "block";
    overlay.style.display = "block";
    successBox.style.display = "none";
    loaderText.innerText = "Saving in database...";

    const data = {
        name: nameInput.value,
        dob: dobInput.value,
        phone: phoneInput.value,
        email: emailInput.value,
        examDate: new Date("2026-02-25T14:30:00.000Z")
    };

    try {
        const response = await fetch("https://exam-portal-be-jey5.onrender.com/api/exam-users", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        if (response.status === 409) {
            loader.style.display = "none";
            overlay.style.display = "none";

            showToast(
                "error",
                "Already Registered",
                "Exam already registered on this email for the upcoming exam."
            );
            return;
        }

        loaderText.innerText = "Preparing your exam access link...";

        setTimeout(() => {
            loader.style.display = "none";
            overlay.style.display = "none";
            successBox.style.display = "block";

            document.getElementById("applicationNumber").innerText =
                "Application Number: " + result.user.applicationNumber;

            document.getElementById("examLink").innerHTML =
                "Your Exam Link and Details Sent to your registered email ID: " +
                "<strong>" + result.user.email + "</strong>" +
                ". Please check your inbox and spam folder.";

            form.reset();
        }, 2000);

    } catch (error) {
        loader.style.display = "none";
        overlay.style.display = "none";

        showToast(
            "error",
            "Registration Failed",
            "Something went wrong. Please try again."
        );
    }
});
</script>

</html>
